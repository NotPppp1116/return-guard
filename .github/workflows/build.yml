name: build

on:
  push:
  pull_request:

jobs:
  linux-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        llvm-version: [22]

    steps:
      - uses: actions/checkout@v5

      - name: Install LLVM/Clang ${{ matrix.llvm-version }}
        run: |
          # Saca e executa o script oficial do repositório LLVM
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          # O argumento 'all' é crucial para instalar o llvm-22-dev e libclang-22-dev
          sudo ./llvm.sh ${{ matrix.llvm-version }} all

      - name: Install other dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            cmake \
            ninja-build \
            python3

      - name: Configure
        run: |
          LLVM_CMAKE_DIR="$(llvm-config-${{ matrix.llvm-version }} --cmakedir)"
          CLANG_CMAKE_DIR="$(dirname "${LLVM_CMAKE_DIR}")/clang"

          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-${{ matrix.llvm-version }} \
            -DLLVM_DIR="${LLVM_CMAKE_DIR}" \
            -DClang_DIR="${CLANG_CMAKE_DIR}" \
            -DRETURNGUARD_WARNINGS_AS_ERRORS=ON

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          cmake --build build 2>&1 | tee build-output.log

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload failing build log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: build-output.log
          if-no-files-found: ignore

      - name: Upload failing CTest log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ctest-last-log
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore
