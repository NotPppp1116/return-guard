name: build

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm-dev libclang-dev cmake ninja-build

      - name: Configure
        run: |
          LLVM_CMAKE_DIR="$(llvm-config --cmakedir)"
          CLANG_CMAKE_DIR="$(dirname "${LLVM_CMAKE_DIR}")/clang"

          cmake -S . -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DLLVM_DIR="${LLVM_CMAKE_DIR}" \
            -DClang_DIR="${CLANG_CMAKE_DIR}"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload failing CTest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-last-log
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore
